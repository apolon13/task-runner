stages:
  - build
  - push

task_runner_build:
  stage: build
  tags: 
    - "task-runner-shell"
  script:
    - docker build -t ${CI_REGISTRY_IMAGE}:latest .

task_runner_push:
  stage: push
  tags: 
    - "task-runner-shell"
  before_script:
    - docker login ${CI_REGISTRY} -u ${CI_REGISTRY_PASSWORD} -p ${CI_REGISTRY_PASSWORD}
  script:
    - docker push -t ${CI_REGISTRY_IMAGE}:latest

